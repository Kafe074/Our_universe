<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quieres ser mi San Valentín? 💜</title>
    <link rel="icon" type="image/png" href="Logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="floating-elements"></div>

    <!-- Volver al Planetario (target="_parent" navega el frame padre, no el iframe) -->
    <a href="../../planetarium.html" class="btn-back" onclick="if(window.parent!==window){window.parent.postMessage('closeOverlay','*');return false;}">
      <svg height="18" width="18" fill="none" viewBox="0 0 24 24" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      <span>Volver al Planetario</span>
    </a>

    <div class="container">
        <h1 id="valentineTitle"></h1>
        
        <div id="musicControls" class="music-controls">
            <button id="musicToggle" class="music-btn">🎵 Poner música</button>
            <audio id="bgMusic" loop>
                <source id="musicSource" type="audio/mpeg">
                Tu navegador no soporta audio.
            </audio>
        </div>

        <div class="question-section" id="question1">
            <h2 id="question1Text"></h2>
            <div class="btn-group">
                <button class="cute-btn" onclick="moveButton(this)" id="yesBtn1"></button>
                <button class="cute-btn" onclick="moveButton(this)" id="noBtn1"></button>
            </div>
            <div class="secret-answer">
                <button class="cute-btn special" onclick="showNextQuestion(2)" id="secretAnswerBtn"></button>
            </div>
        </div>

        <div class="question-section hidden" id="question2">
            <h2 id="question2Text"></h2>
            <div class="love-meter">
                <input type="range" min="0" max="10000" value="100" class="slider" id="loveMeter">
                <p>
                    <span class="love-value-container">
                        <span id="startText"></span> (<span id="loveValue">100</span>%)
                    </span>
                    <span id="extraLove" class="hidden"></span>
                </p>
            </div>
            <button class="cute-btn" onclick="showNextQuestion(3)" id="nextBtn"></button>
        </div>

        <div class="question-section hidden" id="question3">
            <h2 id="question3Text"></h2>
            <div class="btn-group">
                <button class="cute-btn final-yes" onclick="celebrate()" id="yesBtn3"></button>
                <button class="cute-btn" id="noBtn3" onmouseover="flee(this)"></button>
            </div>
        </div>

        <div class="celebration hidden" id="celebration">
            <h2 id="celebrationTitle"></h2>
            <p class="celebration-text" id="celebrationMessage"></p>
            <p class="celebration-text" id="celebrationEmojis" style="font-size: 2.5rem;"></p>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="theme.js"></script>
    <script src="script.js"></script>

    <script>
        function flee(btn) {
            const margin = 60;
            const maxX = window.innerWidth  - btn.offsetWidth  - margin;
            const maxY = window.innerHeight - btn.offsetHeight - margin;
            const x = margin + Math.random() * Math.max(maxX - margin, 0);
            const y = margin + Math.random() * Math.max(maxY - margin, 0);
            btn.style.position  = 'fixed';
            btn.style.zIndex    = '9999';
            btn.style.left      = x + 'px';
            btn.style.top       = y + 'px';
        }
    </script>
</body>
</html>
