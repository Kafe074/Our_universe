<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuestra Historia ✦</title>
  <link rel="icon" type="image/png" href="Logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Volver -->
  <a href="../../planetarium.html" class="btn-back" onclick="if(window.parent!==window){window.parent.postMessage('closeOverlay','*');return false;}">
    <svg height="14" width="14" fill="none" viewBox="0 0 24 24" stroke-width="1.8">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
    </svg>
    <span>Planetario</span>
  </a>

  <!-- Mes actual + contador (esquina superior derecha) -->
  <div id="top-bar">
    <span id="ev-month"></span>
    <span id="ev-counter"></span>
  </div>

  <!-- Slide principal -->
  <div id="slide-wrap">
    <div id="slide"></div>
  </div>

  <!-- Navegación -->
  <div id="nav-bar">
    <button class="nav-btn" id="btn-prev" title="Anterior (↑)">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"/>
      </svg>
    </button>
    <span id="nav-hint">← → o flechas del teclado</span>
    <button class="nav-btn" id="btn-next" title="Siguiente (↓)">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
      </svg>
    </button>
  </div>

  <!-- Barra de progreso -->
  <div id="progress-bar" style="width:0%"></div>

  <script src="events.js"></script>
  <script src="script.js"></script>
</body>
</html>
