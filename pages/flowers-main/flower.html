<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/main.css" />
  <title>Para Lulú</title>
  <link rel="icon" type="image/png" href="Logo.png">
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(ellipse at bottom, #1b2735 0%, #000 100%);
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      color: white;
    }

    .escena-total {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
    }

    /* --- LETRAS: IZQUIERDA, DOS LÍNEAS (ACTUAL + SIGUIENTE) --- */
    #lyrics-container {
      position: absolute;
      left: 5vw;
      width: 42vw;
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      z-index: 1000;
    }

    #lyrics {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    /* Línea activa: amarilla, grande, entra con fade */
    .lyric-current {
      color: #fddd25;
      font-size: clamp(1.3rem, 3vw, 2.4rem);
      font-weight: 900;
      text-transform: uppercase;
      text-align: left;
      letter-spacing: 4px;
      line-height: 1.35;
      text-shadow: 0 0 22px #fddd25, 0 0 45px rgba(253, 221, 37, 0.3);
      white-space: normal;
      animation: lyricIn 0.35s ease-out forwards;
    }

    /* Línea siguiente: gris suave, más pequeña */
    .lyric-next {
      color: rgba(255, 255, 255, 0.28);
      font-size: clamp(0.9rem, 2vw, 1.55rem);
      font-weight: 600;
      text-transform: uppercase;
      text-align: left;
      letter-spacing: 3px;
      line-height: 1.35;
      white-space: normal;
    }

    @keyframes lyricIn {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* --- MENSAJE DE INTRO (0-30 seg) --- */
    #intro-message-container {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      pointer-events: none;
    }

    #intro-text {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.5rem;
      font-style: italic;
      text-align: center;
      max-width: 60%;
      opacity: 0;
    }

    .fade-in-out {
      animation: fadeInOutIntro 4s ease-in-out forwards;
    }

    @keyframes fadeInOutIntro {
      0% {
        opacity: 0;
        transform: scale(0.95);
      }

      20% {
        opacity: 1;
        transform: scale(1);
      }

      80% {
        opacity: 1;
        transform: scale(1);
      }

      100% {
        opacity: 0;
        transform: scale(1.05);
      }
    }

    /* --- FLORES Y TÍTULO --- */
    .flowers-section {
      position: absolute;
      right: 0;
      width: 50vw;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
    }

    .titulo {
      position: absolute;
      top: 8%;
      /* Subido para que no tape flores */
      right: 5vw;
      width: 40vw;
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.8);
      text-align: center;
      font-style: italic;
      z-index: 100;
      line-height: 1.6;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    .titulo b {
      color: #fddd25;
    }

    .flowers {
      position: relative;
      width: 100%;
      height: 60%;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 8vh;
    }

    .night {
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at 20% 30%, #fff, transparent),
        radial-gradient(1px 1px at 70% 10%, #fff, transparent),
        radial-gradient(2px 2px at 90% 85%, #fff, transparent);
      background-size: 400px 400px;
      opacity: 0.4;
      z-index: -1;
    }
  </style>
</head>
<div id="page-transition-overlay"></div>
<a href="../../planetarium.html" class="btn-back" onclick="if(window.parent!==window){window.parent.postMessage('closeOverlay','*');return false;}">
  <svg height="24" width="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
  </svg>
  <span>Volver al Planetario</span>
</a>

<body>

  <audio id="yellow-audio" src="sound/Coldplay - Yellow (lyrics).mp3" autoplay></audio>
  <div class="night"></div>

  <div class="escena-total">
    <div id="lyrics-container">
      <div id="lyrics"></div>
    </div>

    <div class="flowers-section">
      <h1 class="titulo">
        Estas flores son un reflejo de la <b>alegría</b> que traes a mi vida. <br><br>
        Gracias por <b>iluminar</b> mis días con tu presencia.
      </h1>

      <div class="flowers">
        <!-- Flor 1 -->
        <div class="flower flower--1">
          <div class="flower__leafs">
            <div class="flower__leaf flower__leaf--1"></div>
            <div class="flower__leaf flower__leaf--2"></div>
            <div class="flower__leaf flower__leaf--3"></div>
            <div class="flower__leaf flower__leaf--4"></div>
            <div class="flower__leaf flower__leaf--5"></div>
            <div class="flower__leaf flower__leaf--6"></div>
            <div class="flower__leaf flower__leaf--7"></div>
            <div class="flower__leaf flower__leaf--8"></div>
            <div class="flower__white-circle"></div>
          </div>
          <div class="flower__line">
            <div class="flower__line__leaf flower__line__leaf--1"></div>
            <div class="flower__line__leaf flower__line__leaf--2"></div>
          </div>
        </div>

        <!-- Flor 2 (Central) -->
        <div class="flower flower--2">
          <div class="flower__leafs">
            <div class="flower__leaf flower__leaf--1"></div>
            <div class="flower__leaf flower__leaf--2"></div>
            <div class="flower__leaf flower__leaf--3"></div>
            <div class="flower__leaf flower__leaf--4"></div>
            <div class="flower__leaf flower__leaf--5"></div>
            <div class="flower__leaf flower__leaf--6"></div>
            <div class="flower__leaf flower__leaf--7"></div>
            <div class="flower__leaf flower__leaf--8"></div>
            <div class="flower__white-circle"></div>
          </div>
          <div class="flower__line">
            <div class="flower__line__leaf flower__line__leaf--1"></div>
            <div class="flower__line__leaf flower__line__leaf--2"></div>
          </div>
        </div>

        <!-- Flor 3 -->
        <div class="flower flower--3">
          <div class="flower__leafs">
            <div class="flower__leaf flower__leaf--1"></div>
            <div class="flower__leaf flower__leaf--2"></div>
            <div class="flower__leaf flower__leaf--3"></div>
            <div class="flower__leaf flower__leaf--4"></div>
            <div class="flower__leaf flower__leaf--5"></div>
            <div class="flower__leaf flower__leaf--6"></div>
            <div class="flower__leaf flower__leaf--7"></div>
            <div class="flower__leaf flower__leaf--8"></div>
            <div class="flower__white-circle"></div>
          </div>
          <div class="flower__line">
            <div class="flower__line__leaf flower__line__leaf--1"></div>
            <div class="flower__line__leaf flower__line__leaf--2"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="intro-message-container">
      <div id="intro-text"></div>
    </div>
  </div>

  <!-- Indicador de tiempo para calibración — pulsa T para mostrarlo/ocultarlo -->
  <div id="time-debug" style="
    display: none;
    position: fixed;
    bottom: 12px;
    right: 16px;
    background: rgba(0,0,0,0.7);
    color: #fddd25;
    font-family: monospace;
    font-size: 1rem;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid #fddd25;
    z-index: 9999;
    pointer-events: none;
    letter-spacing: 1px;
  "></div>

  <div id="play-prompt" style="
    display: none;
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(253,221,37,0.75);
    font-family: 'Poppins', sans-serif;
    font-size: 0.82rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    z-index: 4000;
    pointer-events: none;
    animation: promptPulse 1.8s ease-in-out infinite;
  ">♪ Toca la pantalla para comenzar</div>
  <style>
    @keyframes promptPulse {
      0%, 100% { opacity: 0.45; }
      50%       { opacity: 1; }
    }
  </style>

  <script>
    const introMessages = [
      { text: "Hay canciones que nos recuerdan momentos...", time: 2 },
      { text: "Otras que nos recuerdan a personas...", time: 8 },
      { text: "Pero esta canción...", time: 14 },
      { text: "Me recuerda por qué eres tan especial para mí.", time: 20 },
      { text: "Espero que te guste, Lulú.", time: 26 }
    ];

    const lyricsData = [
      { text: "Look at the stars", time: 30 },
      { text: "Look how they shine for you", time: 35 },
      { text: "And everything you do", time: 40 },
      { text: "Yeah, they were all yellow", time: 46 },
      { text: "I came along", time: 50 },
      { text: "I wrote a song for you", time: 53 },
      { text: "And all the things you do", time: 58 },
      { text: "And it was called Yellow", time: 63 },
      { text: "So then I took my turn", time: 68 },
      { text: "Oh, what a thing to have done", time: 74 },
      { text: "And it was all yellow", time: 80 },
      { text: "Your skin", time: 88 },
      { text: "Oh yeah, your skin and bones", time: 91 },
      { text: "Turn into something beautiful", time: 95 },
      { text: "Do you know, you know I love you so?", time: 100 },
      { text: "You know I love you so", time: 108 },
      { text: "I swam across", time: 132 },
      { text: "I jumped across for you", time: 136 },
      { text: "Oh, what a thing to do", time: 141 },
      { text: "'Cause you were all yellow", time: 146 },
      { text: "I drew a line", time: 149 },
      { text: "I drew a line for you", time: 152 },
      { text: "Oh, what a thing to do", time: 157 },
      { text: "And it was all yellow", time: 163 },
      { text: "Your skin", time: 171 },
      { text: "Oh yeah, your skin and bones", time: 174 },
      { text: "Turn into something beautiful", time: 177 },
      { text: "Do you know, for you I'd bleed myself dry?", time: 183 },
      { text: "For you I'd bleed myself dry", time: 190 },
      { text: "It's true", time: 215 },
      { text: "Look how they shine for you", time: 218 },
      { text: "Look how they shine for you", time: 223 },
      { text: "Look how they shine for", time: 229 },
      { text: "Look how they shine for you", time: 235 },
      { text: "Look how they shine for you", time: 240 },
      { text: "Look how they shine", time: 245 },
      { text: "Look at the stars", time: 249 },
      { text: "Look how they shine for you", time: 251 },
      { text: "And all the things that you do", time: 257 },
    ];

    // ─── CALIBRACIÓN ───────────────────────────────────────────────
    // Si las letras aparecen TARDE  → sube este número  (ej: 4)
    // Si las letras aparecen ANTES → bájalo a negativo  (ej: -2)
    const OFFSET = 0;
    // ───────────────────────────────────────────────────────────────

    const audio = document.getElementById('yellow-audio');
    const lyricsContainer = document.getElementById('lyrics');
    const introDisplay = document.getElementById('intro-text');
    const playPrompt = document.getElementById('play-prompt');

    let currentLyricIndex = -1;
    const shownIntroIndices = new Set();

    function showIntroMessage(text) {
      introDisplay.innerText = text;
      introDisplay.classList.remove('fade-in-out');
      void introDisplay.offsetWidth;
      introDisplay.classList.add('fade-in-out');
    }

    // Muestra la letra activa (índice) y la siguiente en gris
    function showLyric(index) {
      lyricsContainer.innerHTML = '';

      const current = document.createElement('div');
      current.className = 'lyric-current';
      current.textContent = lyricsData[index].text;
      lyricsContainer.appendChild(current);

      if (index + 1 < lyricsData.length) {
        const next = document.createElement('div');
        next.className = 'lyric-next';
        next.textContent = lyricsData[index + 1].text;
        lyricsContainer.appendChild(next);
      }
    }

    audio.addEventListener('timeupdate', () => {
      const t = audio.currentTime + OFFSET;

      // Intro sincronizado con el audio
      introMessages.forEach((msg, i) => {
        if (t >= msg.time && !shownIntroIndices.has(i)) {
          shownIntroIndices.add(i);
          showIntroMessage(msg.text);
        }
      });

      // Letras sincronizadas con currentTime real del audio
      let activeIndex = -1;
      for (let i = 0; i < lyricsData.length; i++) {
        if (t >= lyricsData[i].time) activeIndex = i;
        else break;
      }

      if (activeIndex !== currentLyricIndex) {
        currentLyricIndex = activeIndex;
        if (activeIndex >= 0) showLyric(activeIndex);
        else lyricsContainer.innerHTML = '';
      }
    });

    // Indicador de tiempo (pulsa T para mostrar/ocultar)
    const timeDebug = document.getElementById('time-debug');
    let debugVisible = false;

    document.addEventListener('keydown', (e) => {
      if (e.key === 't' || e.key === 'T') {
        debugVisible = !debugVisible;
        timeDebug.style.display = debugVisible ? 'block' : 'none';
      }
    });

    audio.addEventListener('timeupdate', () => {
      if (debugVisible) {
        timeDebug.textContent = audio.currentTime.toFixed(2) + 's';
      }
    });

    function startAudio() {
      return audio.play().then(() => {
        if (playPrompt) playPrompt.style.display = 'none';
      });
    }

    window.onload = () => {
      startAudio().catch(() => {
        // Autoplay bloqueado por el navegador — pedir clic
        if (playPrompt) playPrompt.style.display = 'block';
        document.addEventListener('click', function resume() {
          startAudio();
        }, { once: true });
      });
    };
  </script>
</body>

</html>
