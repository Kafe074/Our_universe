<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/main.css" />
  <title>Para Lulú - Yellow</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(ellipse at bottom, #1b2735 0%, #000 100%);
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      color: white;
    }

    .escena-total {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
    }

    /* --- LETRAS: IZQUIERDA Y EN DOS LÍNEAS --- */
    #lyrics-container {
      position: absolute;
      left: 5vw;
      width: 42vw;
      /* Limitado para no tocar flores */
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      z-index: 1000;
    }

    #lyrics {
      width: 100%;
      position: relative;
    }

    .lyric-line {
      position: absolute;
      color: #fddd25;
      font-size: clamp(1.5rem, 3.5vw, 2.8rem);
      font-weight: 900;
      text-transform: uppercase;
      text-align: left;
      /* Alineado a la izquierda */
      letter-spacing: 5px;
      line-height: 1.2;
      text-shadow: 0 0 20px #fddd25, 0 0 40px rgba(253, 221, 37, 0.3);
      opacity: 0;
      white-space: normal;
      /* Permite salto de línea */
      animation: moveUpAndFade 4.5s ease-in-out forwards;
    }

    @keyframes moveUpAndFade {
      0% {
        opacity: 0;
        transform: translateY(60px);
      }

      15% {
        opacity: 1;
        transform: translateY(0px);
      }

      85% {
        opacity: 1;
        transform: translateY(-20px);
      }

      100% {
        opacity: 0;
        transform: translateY(-80px);
      }
    }

    /* --- MENSAJE DE INTRO (0-30 seg) --- */
    #intro-message-container {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      pointer-events: none;
    }

    #intro-text {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.5rem;
      font-style: italic;
      text-align: center;
      max-width: 60%;
      opacity: 0;
    }

    .fade-in-out {
      animation: fadeInOutIntro 4s ease-in-out forwards;
    }

    @keyframes fadeInOutIntro {
      0% {
        opacity: 0;
        transform: scale(0.95);
      }

      20% {
        opacity: 1;
        transform: scale(1);
      }

      80% {
        opacity: 1;
        transform: scale(1);
      }

      100% {
        opacity: 0;
        transform: scale(1.05);
      }
    }

    /* --- FLORES Y TÍTULO --- */
    .flowers-section {
      position: absolute;
      right: 0;
      width: 50vw;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
    }

    .titulo {
      position: absolute;
      top: 8%;
      /* Subido para que no tape flores */
      right: 5vw;
      width: 40vw;
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.8);
      text-align: center;
      font-style: italic;
      z-index: 100;
      line-height: 1.6;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    .titulo b {
      color: #fddd25;
    }

    .flowers {
      position: relative;
      width: 100%;
      height: 60%;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 8vh;
    }

    .night {
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at 20% 30%, #fff, transparent),
        radial-gradient(1px 1px at 70% 10%, #fff, transparent),
        radial-gradient(2px 2px at 90% 85%, #fff, transparent);
      background-size: 400px 400px;
      opacity: 0.4;
      z-index: -1;
    }
  </style>
</head>
<div id="page-transition-overlay"></div>
<a href="../../planetarium.html" class="btn-back">
  <svg height="24" width="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
  </svg>
  <span>Volver al Planetario</span>
</a>

<body>

  <audio src="sound/Coldplay - Yellow (lyrics).mp3" autoplay></audio>
  <div class="night"></div>

  <div class="escena-total">
    <div id="lyrics-container">
      <div id="lyrics"></div>
    </div>

    <div class="flowers-section">
      <h1 class="titulo">
        Estas flores son un reflejo de la <b>alegría</b> que traes a mi vida. <br><br>
        Gracias por <b>iluminar</b> mis días con tu presencia.
      </h1>

      <div class="flowers">
        <!-- Flor 1 -->
        <div class="flower flower--1">
          <div class="flower__leafs">
            <div class="flower__leaf flower__leaf--1"></div>
            <div class="flower__leaf flower__leaf--2"></div>
            <div class="flower__leaf flower__leaf--3"></div>
            <div class="flower__leaf flower__leaf--4"></div>
            <div class="flower__leaf flower__leaf--5"></div>
            <div class="flower__leaf flower__leaf--6"></div>
            <div class="flower__white-circle"></div>
          </div>
          <div class="flower__line">
            <div class="flower__line__leaf flower__line__leaf--1"></div>
            <div class="flower__line__leaf flower__line__leaf--2"></div>
          </div>
        </div>

        <!-- Flor 2 (Central) -->
        <div class="flower flower--2">
          <div class="flower__leafs">
            <div class="flower__leaf flower__leaf--1"></div>
            <div class="flower__leaf flower__leaf--2"></div>
            <div class="flower__leaf flower__leaf--3"></div>
            <div class="flower__leaf flower__leaf--4"></div>
            <div class="flower__leaf flower__leaf--5"></div>
            <div class="flower__leaf flower__leaf--6"></div>
            <div class="flower__white-circle"></div>
          </div>
          <div class="flower__line">
            <div class="flower__line__leaf flower__line__leaf--1"></div>
            <div class="flower__line__leaf flower__line__leaf--2"></div>
          </div>
        </div>

        <!-- Flor 3 -->
        <div class="flower flower--3">
          <div class="flower__leafs">
            <div class="flower__leaf flower__leaf--1"></div>
            <div class="flower__leaf flower__leaf--2"></div>
            <div class="flower__leaf flower__leaf--3"></div>
            <div class="flower__leaf flower__leaf--4"></div>
            <div class="flower__leaf flower__leaf--5"></div>
            <div class="flower__leaf flower__leaf--6"></div>
            <div class="flower__white-circle"></div>
          </div>
          <div class="flower__line">
            <div class="flower__line__leaf flower__line__leaf--1"></div>
            <div class="flower__line__leaf flower__line__leaf--2"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="intro-message-container">
      <div id="intro-text"></div>
    </div>
  </div>

  <script>
    
    const introMessages = [
      { text: "Hay canciones que nos recuerdan momentos...", time: 2 },
      { text: "Otras que nos recuerdan a personas...", time: 8 },
      { text: "Pero esta canción...", time: 14 },
      { text: "Me recuerda por qué eres tan especial para mí.", time: 20 },
      { text: "Espero que te guste, Lulú.", time: 26 }
    ];

    var lyricsData = [
      { text: "Look at the stars", time: 30 },
      { text: "Look how they shine for you", time: 35 },
      { text: "And everything you do", time: 40 },
      { text: "Yeah, they were all yellow", time: 45 },
      { text: "I came along", time: 54 },
      { text: "I wrote a song for you", time: 59 },
      { text: "And all the things you do", time: 64 },
      { text: "And it was called Yellow", time: 69 },
      { text: "So then I took my turn", time: 78 },
      { text: "Oh, what a thing to have done", time: 83 },
      { text: "And it was all yellow", time: 88 },
      { text: "Your skin", time: 98 },
      { text: "Oh yeah, your skin and bones", time: 103 },
      { text: "Turn into something beautiful", time: 108 },
      { text: "Do you know, you know I love you so?", time: 115 },
      { text: "You know I love you so", time: 120 },
      { text: "I swam across", time: 129 },
      { text: "I jumped across for you", time: 134 },
      { text: "Oh, what a thing to do", time: 139 },
      { text: "'Cause you were all yellow", time: 144 },
      { text: "I drew a line", time: 153 },
      { text: "I drew a line for you", time: 158 },
      { text: "Oh, what a thing to do", time: 163 },
      { text: "And it was all yellow", time: 168 },
      { text: "Your skin", time: 178 },
      { text: "Oh yeah, your skin and bones", time: 183 },
      { text: "Turn into something beautiful", time: 188 },
      { text: "Do you know, for you I'd bleed myself dry?", time: 195 },
      { text: "For you I'd bleed myself dry", time: 201 },
      { text: "It's true", time: 215 },
      { text: "Look how they shine for you", time: 219 },
      { text: "Look how they shine for you", time: 225 },
      { text: "Look how they shine for", time: 231 },
      { text: "Look how they shine for you", time: 237 },
      { text: "Look how they shine for you", time: 242 },
      { text: "Look how they shine", time: 248 },
      { text: "Look at the stars", time: 257 },
      { text: "Look how they shine for you", time: 263 },
      { text: "And all the things that you do", time: 269 },
    ];

    function showIntroMessages() {
      const introDisplay = document.getElementById("intro-text");
      introMessages.forEach((msg) => {
        setTimeout(() => {
          introDisplay.innerText = msg.text;
          introDisplay.classList.remove("fade-in-out");
          void introDisplay.offsetWidth;
          introDisplay.classList.add("fade-in-out");
        }, msg.time * 1000);
      });
    }

    function showLyrics() {
      const lyricsContainer = document.getElementById("lyrics");
      lyricsData.forEach((line) => {
        setTimeout(() => {
          lyricsContainer.innerHTML = '';
          const lineElement = document.createElement("div");
          lineElement.classList.add("lyric-line");
          lineElement.innerText = line.text;
          lyricsContainer.appendChild(lineElement);
        }, line.time * 1000);
      });
    }

    // Único punto de inicio
    window.onload = () => {
      showIntroMessages();
      showLyrics();
    };
  </script>
</body>

</html>
