<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lulú & Itito</title>
    <link rel="icon" type="image/png" href="Logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Raleway:wght@200;300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div id="cursor"></div>
    <div id="cursor-ring"></div>
    <canvas id="canvas"></canvas>
    <div class="nebula"></div>
    <div class="grain"></div>

    <div class="scene">
        <div class="eyebrow">✦ &nbsp; para ti, siempre &nbsp; ✦</div>
        <div class="names">Lulú &amp; Itito</div>
        <div class="ornament">
            <div class="orn-line"></div>
            <div class="orn-gem"></div>
            <div class="orn-line"></div>
        </div>
        <p class="tagline">cada rincón de este espacio<br>guarda algo que vivimos juntos</p>
        <div class="btn-wrap">
            <button class="btn" id="enter-btn">
                <div class="btn-body">
                    <div class="btn-sweep"></div>
                    <span class="btn-text">Entrar a nuestro universo</span>
                    <span class="btn-star">✦</span>
                </div>
            </button>
        </div>
    </div>

    <script src="js/index.js"></script>
</body>
</html>
